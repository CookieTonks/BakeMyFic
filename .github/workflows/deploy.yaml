name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload to FTP server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: sand4rt/ftp-deployer@v1.8
        with:
          sftp: false
          host: ${{ secrets.FTP_SERVER }}
          port: 21
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          remote_folder: /home/cokiecod/bakemyfic.cookiecodes.com.mx/
          local_folder: ./
          cleanup: false
          passive: true
          exclude: '["**/.git*", "**/.git*/**", "**/__pycache__/**", "**/*.pyc", ".thumbnail", "CLAUDE.md"]'
